# MiMo leaderboard watchlist
# Used by analysis/differ.py to decide which model changes are noteworthy
# and at what severity.

# 主关注：所有 xiaomi 模型
primary:
  organization: xiaomi
  # 额外的 model_id 子串（大小写不敏感），用于 organization 字段缺失时兜底
  model_id_substrings:
    - mimo
    - xiaomi

# 关注的对手（按 organization 关键词匹配，大小写不敏感子串匹配）
competitors_organizations:
  - openai
  - anthropic
  - google
  - deepseek
  - alibaba       # 通义千问 / qwen
  - moonshot      # kimi
  - zhipuai       # GLM
  - baichuan
  - 01.ai         # yi
  - meta
  - xai
  - mistral

# 关注的具体竞品模型（display name / model_id 子串匹配，大小写不敏感）
competitors_models:
  - qwen
  - deepseek
  - kimi
  - glm
  - claude
  - gpt
  - gemini
  - llama
  - grok

# 告警阈值
alert_rules:
  # 任意 watchlist 模型 rank 变化 >= 阈值触发对应级别
  rank_change_warn: 3
  rank_change_alert: 8

  # 跨过这些档位（进入或跌出 Top N），单独触发
  rank_milestones: [1, 3, 5, 10, 20, 50, 100]

  # 新模型上榜 / 老模型掉榜
  new_model: true
  dropped_model: true

  # 分数变化绝对值的百分比阈值
  score_change_pct: 1.0

# severity 等级：
#   INFO  - 仅落 markdown，不开 issue
#   WARN  - 开 issue，不打 alert label
#   ALERT - 开 issue + alert label（触发邮件）
severity_overrides:
  # 任何 mimo 相关的变动至少 WARN
  primary_min_severity: WARN
  # mimo 进入 Top10 或跌出 Top20 强制 ALERT
  primary_milestone_alert: [10, 20]
